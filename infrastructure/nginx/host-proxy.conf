# HTTPS reverse proxy for whatsapp.nextmavens.cloud
# This proxies all traffic to the Docker container on localhost:6429

server {
    listen 80;
    server_name whatsapp.nextmavens.cloud;
    # Let's Encrypt challenge location
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name whatsapp.nextmavens.cloud;

    # SSL certificates (obtained via Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/whatsapp.nextmavens.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/whatsapp.nextmavens.cloud/privkey.pem;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Proxy to Docker container
    location / {
        proxy_pass http://127.0.0.1:6429;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
