services:
  whatsapp-frontend:
    image: nginx:alpine
    container_name: nextmavens-whatsapp-frontend
    restart: unless-stopped
    networks:
      - nextmavens_net
    ports:
      - "127.0.0.1:6429:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 128m
    mem_reservation: 64m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  evolution-api:
    image: atendai/evolution-api:v1.8.2
    container_name: nextmavens-whatsapp-evolution
    restart: unless-stopped
    networks:
      - nextmavens_net
    ports:
      - "127.0.0.1:3001:8080"
    environment:
      EVOLUTION_DATABASE_URL: postgres://nextmavens:ZX9YxsqZIuwuvAVZIEmEzGUU2orz7gUGQZ49k54o2Qw=@172.17.0.1:5432/nextmavens_platform
      EVOLUTION_REDIS_URL: redis://172.17.0.1:6379
      EVOLUTION_AUTH_JWT_SECRET: ${JWT_SECRET}
      EVOLUTION_AUTH_JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      EVOLUTION_WEBHOOK_SECRET_KEY: ${EVOLUTION_WEBHOOK_SECRET}
      EVOLUTION_WEBHOOK_ENABLED: "true"
      EVOLUTION_WEBHOOK_URL: https://api.nextmavens.cloud/webhooks/whatsapp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 256m
    mem_reservation: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  whatsapp-redis:
    image: redis:7-alpine
    container_name: nextmavens-whatsapp-redis
    restart: unless-stopped
    networks:
      - nextmavens_net
    command: redis-server --appendonly yes --maxmemory 32mb --maxmemory-policy allkeys-lru
    volumes:
      - whatsapp_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 64m
    mem_reservation: 32m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  whatsapp-postgres:
    image: postgres:16-alpine
    container_name: nextmavens-whatsapp-postgres
    restart: unless-stopped
    networks:
      - nextmavens_net
    ports:
      - "127.0.0.1:5433:5432"  # Publish to localhost:5433 for host access
    environment:
      POSTGRES_USER: nextmavens
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: nextmavens_platform
    volumes:
      - whatsapp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextmavens"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 256m
    mem_reservation: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  whatsapp_redis_data:
    driver: local
  whatsapp_postgres_data:
    driver: local

networks:
  nextmavens_net:
    external: true
