openapi: 3.1.0
info:
  title: NEXTMAVENS WhatsApp Platform API
  version: 1.0.0
  description: |
    Enterprise-grade WhatsApp Business API platform with multi-tenancy, rate limiting,
    audit logging, and 2FA security. This API provides comprehensive messaging capabilities
    backed by the WhatsApp Evolution API.

    **Base URL**: `http://localhost:3000` (development)

    **Authentication**: Bearer JWT tokens obtained via your authentication provider.

    **Format**: All requests/responses use JSON. Dates are ISO 8601 strings.

    **Pagination**: List endpoints support `page` (default 1) and `limit` (default 20, max 100) query parameters.
    Responses include `data` array and `hasMore` boolean.

    **Error Handling**: Errors return appropriate HTTP status codes with JSON body:
    ```json
    {
      "error": "Error Code",
      "message": "Human-readable description"
    }
    ```
  contact:
    name: NEXTMAVENS Support
    email: support@nextmavens.com
  license:
    name: Proprietary
    url: https://nextmavens.com/legal

servers:
  - url: http://localhost:3000
    description: Development server

security:
  - bearerAuth: []

tags:
  - name: Health
    description: Health check endpoints
  - name: Webhooks
    description: Evolution API webhook receivers
  - name: Phone
    description: Phone number utilities
  - name: Deduplication
    description: Message deduplication configuration
  - name: Receipts
    description: Delivery receipt tracking
  - name: Rate Limiting
    description: Admin rate limit rule management
  - name: Quotas
    description: Plan quota configuration
  - name: Queue
    description: Message queue administration
  - name: DLQ
    description: Dead letter queue management
  - name: Audit
    description: Immutable audit logs
  - name: Workflow
    description: Workflow orchestration engine
  - name: 2FA
    description: Two-factor authentication management
  - name: Invoice
    description: Invoice generation and download
  - name: Usage
    description: Usage-based billing and analytics

paths:
  # ============================================================================
  # Workflow Orchestration
  # ============================================================================

  /admin/workflows:
    post:
      tags: [Workflow]
      summary: Create workflow definition
      description: Creates a new workflow definition with steps and configuration.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkflowRequest'
      responses:
        '200':
          description: Workflow definition created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowDefinitionResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

    get:
      tags: [Workflow]
      summary: List workflow definitions
      description: Returns paginated list of workflow definitions with optional filters.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
        - name: isActive
          in: query
          schema: { type: boolean }
        - name: search
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Paginated list of workflow definitions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListWorkflowsResponse'

  /admin/workflows/{id}:
    get:
      tags: [Workflow]
      summary: Get workflow definition
      description: Retrieves full details of a workflow definition by ID.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Workflow definition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowDefinitionResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Workflow]
      summary: Update workflow definition
      description: Updates mutable fields of a workflow definition. Steps, compensation, and retryPolicy replace existing values when provided.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkflowRequest'
      responses:
        '200':
          description: Workflow definition updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowDefinitionResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Workflow]
      summary: Delete workflow definition
      description: Soft deletes a workflow definition (sets isActive=false). Cannot be re-activated.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Workflow definition deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      id: { type: string }
                      isActive: { type: boolean }
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/workflows/instances:
    post:
      tags: [Workflow]
      summary: Start workflow instance
      description: Creates and starts a new workflow execution instance.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartWorkflowRequest'
      responses:
        '200':
          description: Workflow instance started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowInstanceResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

    get:
      tags: [Workflow]
      summary: List workflow instances
      description: Returns paginated list of workflow instance executions.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
        - name: definitionId
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, RUNNING, COMPLETED, FAILED, CANCELLED, COMPENSATING, COMPENSATED]
        - name: orgId
          in: query
          schema: { type: string }
        - name: fromDate
          in: query
          schema: { type: string, format: date-time }
        - name: toDate
          in: query
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Paginated list of workflow instances
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListInstancesResponse'

  /admin/workflows/instances/{instanceId}:
    get:
      tags: [Workflow]
      summary: Get workflow instance status
      description: Returns detailed status including full step history for the instance.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: instanceId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Workflow instance details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowInstanceResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Workflow]
      summary: Cancel workflow instance
      description: Initiates cancellation of a running workflow. Triggers compensation if defined.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: instanceId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Optional cancellation reason
      responses:
        '200':
          description: Workflow cancellation initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      instanceId: { type: string }
                      status: { type: string, enum: [cancelled] }
        '400':
          $ref: '#/components/responses/BadRequest'

  /admin/workflows/health:
    get:
      tags: [Workflow]
      summary: Workflow engine health check
      description: Returns health status of the workflow orchestration system including queue metrics.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowHealthResponse'

  /admin/invoices:
    post:
      tags: [Invoice]
      summary: Create invoice
      description: Creates a new invoice (draft or open). Requires authentication and org membership.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceRequest'
      responses:
        '200':
          description: Invoice created
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/InvoiceResponse'
                  error:
                    type: string
                    nullable: true
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    get:
      tags: [Invoice]
      summary: List invoices
      description: Retrieve paginated list of invoices for the authenticated organization.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: orgId
          in: query
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [DRAFT, OPEN, PAID, VOID, UNCOLLECTIBLE]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Paginated invoice list
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/InvoiceListResponse'
                  error:
                    type: string
                    nullable: true
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/invoices/{id}:
    get:
      tags: [Invoice]
      summary: Get invoice details
      description: Retrieve full invoice details including line items.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invoice details
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/InvoiceDetailResponse'
                  error:
                    type: string
                    nullable: true
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

    put:
      tags: [Invoice]
      summary: Finalize invoice
      description: Finalize a draft invoice and generate its PDF.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinalizeInvoiceRequest'
      responses:
        '200':
          description: Invoice finalized
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/FinalizeInvoiceResponse'
                  error:
                    type: string
                    nullable: true
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

    delete:
      tags: [Invoice]
      summary: Delete invoice
      description: Delete a draft invoice. Only draft invoices can be deleted.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invoice deleted
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/DeleteInvoiceResponse'
                  error:
                    type: string
                    nullable: true
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/invoices/{id}/download:
    get:
      tags: [Invoice]
      summary: Download invoice PDF
      description: Download the generated PDF file for an invoice.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/invoices/{id}/void:
    post:
      tags: [Invoice]
      summary: Void invoice
      description: Mark an invoice as void (cannot be paid afterwards).
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoidInvoiceRequest'
      responses:
        '200':
          description: Invoice voided
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/VoidInvoiceResponse'
                  error:
                    type: string
                    nullable: true
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ============================================================================
  # Usage-Based Billing
  # ============================================================================

  /api/usage/events:
    post:
      tags: [Usage]
      summary: Record usage event
      description: Record a usage meter event for billing purposes.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [meter, value]
              properties:
                meter:
                  type: string
                  minLength: 1
                  maxLength: 100
                  description: Meter name (e.g., "api_requests", "messages_sent")
                value:
                  type: integer
                  minimum: 1
                  description: Usage quantity
                customerId:
                  type: string
                  description: Optional customer identifier (defaults to org ID)
                metadata:
                  type: object
                  additionalProperties: true
                  description: Optional metadata
      responses:
        '200':
          description: Usage recorded successfully
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    required: [eventId, currentUsage, quotaRemaining, overageWarning]
                    properties:
                      eventId:
                        type: string
                      currentUsage:
                        type: integer
                      quotaRemaining:
                        type: integer
                      overageWarning:
                        type: boolean
                      message:
                        type: string
                        nullable: true
                  error:
                    type: string
                    nullable: true
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/usage/current:
    get:
      tags: [Usage]
      summary: Get current usage
      description: Retrieve current period usage for a specific meter.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: meter
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 100
            description: Meter name (e.g., "api_requests", "messages_sent")
      responses:
        '200':
          description: Current usage data
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    required: [usage, meter, periodStart, periodEnd]
                    properties:
                      usage:
                        type: integer
                      meter:
                        type: string
                      periodStart:
                        type: string
                        format: date-time
                      periodEnd:
                        type: string
                        format: date-time
                  error:
                    type: string
                    nullable: true
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/usage/analytics:
    get:
      tags: [Usage]
      summary: Get usage analytics
      description: Retrieve usage analytics over a date range with daily breakdown.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: meter
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 100
        - name: dateFrom
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Usage analytics
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    required: [meter, periodStart, periodEnd, totalUsage, dailyBreakdown]
                    properties:
                      meter:
                        type: string
                      periodStart:
                        type: string
                        format: date-time
                      periodEnd:
                        type: string
                        format: date-time
                      totalUsage:
                        type: integer
                      dailyBreakdown:
                        type: array
                        items:
                          type: object
                          required: [date, value]
                          properties:
                            date:
                              type: string
                              format: date-time
                            value:
                              type: integer
                  error:
                    type: string
                    nullable: true
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============================================================================
  # Health Check
  # ============================================================================
  /health:
    get:
      tags: [Health]
      summary: Health check endpoint
      description: Returns overall system health including database and Redis connectivity.
      security: [] # Public
      responses:
        '200':
          description: System healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                  uptime:
                    type: number
                    description: Server uptime in seconds
                  database:
                    type: boolean
                    description: Database connectivity status
                  redis:
                    type: boolean
                    description: Redis connectivity status
                  memory:
                    type: object
                    properties:
                      rss:
                        type: number
                      heapTotal:
                        type: number
                      heapUsed:
                        type: number
                      external:
                        type: number
              example:
                status: ok
                timestamp: "2025-03-14T10:30:00.000Z"
                uptime: 3600
                database: true
                redis: true
                memory:
                  rss: 50000000
                  heapTotal: 30000000
                  heapUsed: 20000000
                  external: 5000000

  # ============================================================================
  # Evolution API Webhooks
  # ============================================================================
  /api/webhooks/evolution/{instance}/{event}:
    post:
      tags: [Webhooks]
      summary: Receive Evolution API webhook events
      description: |
        Webhook endpoint for receiving message status updates from Evolution API.
        Signature verification is performed using the `X-Api-Key` and HMAC signature.
      security: [] # Public - signature verified in handler
      parameters:
        - name: instance
          in: path
          required: true
          schema:
            type: string
            description: WhatsApp instance identifier
        - name: event
          in: path
          required: true
          schema:
            type: string
            enum: [messages.upsert, messages.update, connection.update]
            description: Event type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Event payload (structure varies by event type)
      responses:
        '200':
          description: Webhook received and queued for processing
        '400':
          description: Invalid signature or payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error

  # ============================================================================
  # Phone Validation
  # ============================================================================
  /api/phone/validate:
    post:
      tags: [Phone]
      summary: Validate and normalize phone number
      description: |
        Parse and validate a phone number using libphonenumber-js.
        Returns E.164 format if valid, or validation errors.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone:
                  type: string
                  description: Phone number in any format
                  example: "+1 (555) 123-4567"
                countryCode:
                  type: string
                  description: Optional default country code (e.g., "US")
                  example: "US"
      responses:
        '200':
          description: Phone number is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  phone:
                    type: string
                    description: Normalized E.164 format
                    example: "+15551234567"
                  country:
                    type: string
                    description: Detected country code
                  example:
                    valid: true
                    phone: "+15551234567"
                    country: "US"
        '400':
          description: Invalid phone number
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation error (missing required fields)

  # ============================================================================
  # Message Deduplication
  # ============================================================================
  /api/deduplication/config:
    get:
      tags: [Deduplication]
      summary: Get deduplication configuration
      description: Retrieve current deduplication window settings for all message types.
      security: []
      responses:
        '200':
          description: Configuration fetched
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    additionalProperties:
                      type: number
                      description: Deduplication window in seconds
                  example:
                    success: true
                    data:
                      text: 86400
                      image: 86400
                      document: 86400
    put:
      tags: [Deduplication]
      summary: Update deduplication configuration
      description: Configure deduplication windows per message type. Values in seconds.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: number
              example:
                text: 86400
                image: 86400
      responses:
        '200':
          description: Configuration updated
        '400':
          description: Invalid configuration

  /api/deduplication/clear:
    post:
      tags: [Deduplication]
      summary: Clear deduplication cache
      description: Manually flush the deduplication cache (for testing or emergency).
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                messageType:
                  type: string
                  description: Optional: clear only specific message type
      responses:
        '200':
          description: Cache cleared

  # ============================================================================
  # Delivery Receipts
  # ============================================================================
  /api/receipts/{messageId}:
    get:
      tags: [Receipts]
      summary: Get delivery receipt for a message
      description: Retrieve the delivery status (sent, delivered, read, failed) for a message.
      security: []
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: string
            description: Unique message ID from WhatsApp
      responses:
        '200':
          description: Receipt found
          content:
            application/json:
              schema:
                type: object
                properties:
                  messageId:
                    type: string
                  status:
                    type: string
                    enum: [sent, delivered, read, failed]
                    description: Delivery status
                  timestamp:
                    type: string
                    format: date-time
                  error:
                    type: string
                    description: Error message if status=failed
                  example:
                    messageId: "abcdef123456"
                    status: "delivered"
                    timestamp: "2025-03-14T10:25:00.000Z"
        '404':
          description: Receipt not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ============================================================================
  # Rate Limiting Admin
  # ============================================================================
  /admin/rate-limiting/rules:
    get:
      tags: [Rate Limiting]
      summary: List all rate limit rules
      description: Retrieve all configured rate limit rules (default + overrides).
      responses:
        '200':
          description: Rules list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RateLimitRule'
                  example:
                    success: true
                    data:
                      - id: "global"
                        maxRequests: 100
                        windowMs: 60000
                        priority: 1
    post:
      tags: [Rate Limiting]
      summary: Create a new rate limit rule
      description: Create a rule to override default rate limits for specific org/instance/endpoint combinations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRateLimitRule'
      responses:
        '200':
          description: Rule created

  /admin/rate-limiting/rules/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Rate Limiting]
      summary: Get rate limit rule by ID
      responses:
        '200':
          description: Rule details
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/RateLimitRule'
                  - type: null
        '404':
          description: Rule not found
    put:
      tags: [Rate Limiting]
      summary: Update rate limit rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRateLimitRule'
      responses:
        '200':
          description: Rule updated
        '404':
          description: Rule not found
    delete:
      tags: [Rate Limiting]
      summary: Delete rate limit rule
      responses:
        '200':
          description: Rule deleted
        '404':
          description: Rule not found

  /admin/rate-limiting/metrics:
    get:
      tags: [Rate Limiting]
      summary: Get rate limiting metrics
      description: View current rate limit usage and blocked request counts.
      responses:
        '200':
          description: Metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      totalRequests:
                        type: number
                      blockedRequests:
                        type: number
                      currentUsage:
                        type: object
                        additionalProperties:
                          type: number
                  example:
                    success: true
                    data:
                      totalRequests: 12500
                      blockedRequests: 34
                      currentUsage:
                        "org:123:instance:456": 42
                        "global": 15

  /admin/rate-limiting/metrics/reset:
    post:
      tags: [Rate Limiting]
      summary: Reset rate limiting metrics
      description: Clear all metrics counters and usage trackers.
      responses:
        '200':
          description: Metrics reset

  /admin/rate-limiting/status/{identifier}:
    get:
      tags: [Rate Limiting]
      summary: Get rate limit status for identifier
      description: Check current usage and reset time for a specific request identifier.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  allowed:
                    type: boolean
                  remaining:
                    type: number
                  resetAfterMs:
                    type: number
                  resetAt:
                    type: string
                    format: date-time

  /admin/rate-limiting/reset/{identifier}:
    post:
      tags: [Rate Limiting]
      summary: Reset rate limit for identifier
      description: Manually reset the rate limit counter for a specific identifier (bypass until next window).
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rate limit reset

  # ============================================================================
  # Quota Administration
  # ============================================================================
  /admin/quotas:
    get:
      tags: [Quotas]
      summary: List all quota configurations
      description: Retrieve quota limits for all plans (FREE, PRO, ENTERPRISE).
      responses:
        '200':
          description: Quota configurations
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/QuotaConfigs'
    put:
      tags: [Quotas]
      summary: Update quota configuration
      description: Modify the quota limits for specific metrics and periods.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateQuotaConfig'
      responses:
        '200':
          description: Quota configuration updated

  /admin/quotas/usage:
    get:
      tags: [Quotas]
      summary: Get current quota usage for org
      description: View current consumption for the authenticated org across all quota metrics.
      responses:
        '200':
          description: Usage data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/QuotaUsage'
                  example:
                    success: true
                    data:
                      messages:
                        hourly:
                          current: 450
                          limit: 1000
                          remaining: 550
                          resetAt: "2025-03-14T11:00:00.000Z"
                        daily:
                          current: 5000
                          limit: 10000
                          remaining: 5000
                          resetAt: "2025-03-14T23:59:59.000Z"

  # ============================================================================
  # Message Queue Priority Admin
  # ============================================================================
  /admin/queue/priority:
    get:
      tags: [Queue]
      summary: Get queue priority metrics
      description: View message counts per priority level across all queues.
      responses:
        '200':
          description: Priority metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      high:
                        type: number
                      normal:
                        type: number
                      low:
                        type: number
                  example:
                    success: true
                    data:
                      high: 15
                      normal: 234
                      low: 89

  /admin/queue/priority/move:
    post:
      tags: [Queue]
      summary: Move message between queues
      description: Change the priority of a queued message.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messageId, newPriority]
              properties:
                messageId:
                  type: string
                newPriority:
                  type: string
                  enum: [high, normal, low]
      responses:
        '200':
          description: Message priority updated
        '404':
          description: Message not found in queue

  # ============================================================================
  # Dead Letter Queue (DLQ) Admin
  # ============================================================================
  /admin/dlq:
    get:
      tags: [DLQ]
      summary: List dead letter queue contents
      description: Retrieve failed webhook deliveries that are awaiting retry or manual intervention.
      parameters:
        - name: page
          in: query
          schema:
            type: number
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: number
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: DLQ messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DLQMessage'
                  hasMore:
                    type: boolean
    post:
      tags: [DLQ]
      summary: Retry a dead letter message
      description: Re-queue a failed webhook for immediate reprocessing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  description: DLQ message ID
      responses:
        '200':
          description: Message re-queued
        '404':
          description: DLQ message not found

  /admin/dlq/{id}:
    delete:
      tags: [DLQ]
      summary: Delete a dead letter message
      description: Permanently remove a failed webhook from the DLQ (use with caution).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Message deleted
        '404':
          description: Message not found

  # ============================================================================
  # Audit Logs Admin
  # ============================================================================
  /admin/audit-logs:
    get:
      tags: [Audit]
      summary: List audit logs
      description: |
        Query immutable audit logs with optional filters.
        Supports pagination and date range queries.
      parameters:
        - name: orgId
          in: query
          schema:
            type: string
          description: Filter by organization ID (SUPER_ADMIN only)
        - name: userId
          in: query
          schema:
            type: string
          description: Filter by user ID
        - name: action
          in: query
          schema:
            type: string
          description: Filter by action type (e.g., "user.created", "mfa.enabled")
        - name: resource
          in: query
          schema:
            type: string
          description: Filter by resource type (e.g., "user", "org", "whatsapp_instance")
        - name: resourceId
          in: query
          schema:
            type: string
          description: Filter by specific resource ID
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
          description: Filter logs after this timestamp
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
          description: Filter logs before this timestamp
        - name: page
          in: query
          schema:
            type: number
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: number
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Audit log list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditLog'
                  hasMore:
                    type: boolean
                  total:
                    type: number
                    description: Total matching records (if requested)
    get:
      tags: [Audit]
      summary: Get audit log by ID
      description: Retrieve a single audit log entry by its unique ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: cidr
      responses:
        '200':
          description: Audit log found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLog'
        '404':
          description: Audit log not found

  # ============================================================================
  # Two-Factor Authentication Admin
  # ============================================================================
  /admin/2fa/setup:
    post:
      tags: [2FA]
      summary: Generate 2FA setup credentials
      description: |
        Generate a new TOTP secret and QR code for 2FA enrollment.
        User must already be authenticated.
        The secret is stored temporarily in the user's record.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          description: Setup data generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/TwoFactorSetup'
                  message:
                    type: string
        '400':
              description: 2FA already enabled
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/Error'

  /admin/2fa/verify:
    post:
      tags: [2FA]
      summary: Verify TOTP token and enable 2FA
      description: |
        Submit a 6-digit code from the authenticator app to complete 2FA setup.
        Must be called within a reasonable time after `/setup`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  pattern: '^\d{6}$'
                  description: 6-digit TOTP code
      responses:
        '200':
          description: 2FA enabled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          description: Invalid token format
        '401':
          description: Token verification failed or no pending setup
        '500':
          description: Verification failed

  /admin/2fa/disable:
    post:
      tags: [2FA]
      summary: Disable 2FA for user
      description: |
        Disable two-factor authentication. Requires the current valid 2FA token
        as confirmation to prevent malicious deactivation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  pattern: '^\d{6}$'
      responses:
        '200':
          description: 2FA disabled
        '401':
          description: Token verification failed
        '500':
          description: Disable failed

  /admin/2fa/status:
    get:
      tags: [2FA]
      summary: Get 2FA status for user
      description: |
        Check whether 2FA is enabled and required for the authenticated user.
        SUPER_ADMIN can check other users by providing `userId` query parameter.
      parameters:
        - name: userId
          in: query
          schema:
            type: string
          description: Optional: check another user's status (SUPER_ADMIN only)
      responses:
        '200':
          description: Status retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/TwoFactorStatus'
        '403':
          description: Non-SUPER_ADMIN attempting to check another user
        '404':
          description: User not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT token obtained from authentication endpoint.
        Token must be included in `Authorization: Bearer <token>` header.

  schemas:
    Error:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable explanation
      example:
        error: "MFA_REQUIRED"
        message: "Two-factor authentication required"

    RateLimitRule:
      type: object
      required: [id, maxRequests, windowMs]
      properties:
        id:
          type: string
          description: Unique rule identifier
        maxRequests:
          type: number
          description: Maximum requests in window
        windowMs:
          type: number
          description: Time window in milliseconds
        orgId:
          type: string
          nullable: true
          description: Organization-specific override (null = global)
        instanceId:
          type: string
          nullable: true
          description: Instance-specific override
        endpoint:
          type: string
          nullable: true
          description: Specific endpoint pattern (null = all endpoints)
        priority:
          type: number
          description: Rule priority (lower = higher)
      example:
        id: "org:123:all"
        maxRequests: 1000
        windowMs: 3600000
        orgId: "org_123"
        instanceId: null
        endpoint: null
        priority: 10

    CreateRateLimitRule:
      type: object
      required: [maxRequests, windowMs]
      properties:
        ruleId:
          type: string
        maxRequests:
          type: number
        windowMs:
          type: number
        orgId:
          type: string
          nullable: true
        instanceId:
          type: string
          nullable: true
        endpoint:
          type: string
          nullable: true

    UpdateRateLimitRule:
      type: object
      properties:
        maxRequests:
          type: number
        windowMs:
          type: number
        orgId:
          type: string
          nullable: true
        instanceId:
          type: string
          nullable: true
        endpoint:
          type: string
          nullable: true
        priority:
          type: number

    QuotaConfigs:
      type: object
      additionalProperties:
        type: object
        properties:
          messages:
            type: number
          instances:
            type: number
          apiCalls:
            type: object
            properties:
              hourly:
                type: number
              daily:
                type: number
              monthly:
                type: number

    UpdateQuotaConfig:
      type: object
      properties:
        plan:
          type: string
          enum: [FREE, PRO, ENTERPRISE]
        quotas:
          $ref: '#/components/schemas/QuotaConfigs'

    QuotaUsage:
      type: object
      additionalProperties:
        type: object
        properties:
          current:
            type: number
          limit:
            type: number
          remaining:
            type: number
          resetAt:
            type: string
            format: date-time

    DLQMessage:
      type: object
      properties:
        id:
          type: string
        event:
          type: string
        payload:
          type: object
          additionalProperties: true
        attempts:
          type: number
        lastError:
          type: string
        nextRetryAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    AuditLog:
      type: object
      required: [id, userId, action, createdAt]
      properties:
        id:
          type: string
        orgId:
          type: string
          nullable: true
          description: NULL for SUPER_ADMIN actions
        userId:
          type: string
        action:
          type: string
          description: Action performed (e.g., "user.created", "mfa.enabled")
        resource:
          type: string
        resourceId:
          type: string
          nullable: true
        changes:
          type: object
          additionalProperties: true
          description: JSON snapshot of before/after changes
        ipAddress:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    TwoFactorSetup:
      type: object
      required: [secret, qrCode, manualEntry, issuer, label]
      properties:
        secret:
          type: string
          description: Base32-encoded TOTP secret (for manual entry)
        qrCode:
          type: string
          description: Data URL containing QR code image
        manualEntry:
          type: string
          sameAs: secret
        issuer:
          type: string
          description: Application name (NEXTMAVENS WhatsApp Platform)
        label:
          type: string
          description: User identifier (email)

    TwoFactorStatus:
      type: object
      required: [enabled, isPrivileged, requires2FA]
      properties:
        enabled:
          type: boolean
          description: Whether 2FA is currently enabled
        isPrivileged:
          type: boolean
          description: Whether user has a privileged role (SUPER_ADMIN, ORG_ADMIN)
        requires2FA:
          type: boolean
          description: Whether 2FA is mandatory for this user (true for privileged roles)

    MessageReceipt:
      type: object
      required: [messageId, status, timestamp]
      properties:
        messageId:
          type: string
        status:
          type: string
          enum: [sent, delivered, read, failed]
        timestamp:
          type: string
          format: date-time
        error:
          type: string
          nullable: true

    PhoneValidationResult:
      type: object
      required: [valid, phone]
      properties:
        valid:
          type: boolean
        phone:
          type: string
          description: Normalized E.164 format
        country:
          type: string
          description: Detected country code

    DedupConfig:
      type: object
      additionalProperties:
        type: number
        description: Deduplication window in seconds
      example:
        text: 86400
        image: 86400
        document: 86400

    HealthStatus:
      type: object
      required: [status, timestamp, database, redis]
      properties:
        status:
          type: string
          enum: [ok, error]
        timestamp:
          type: string
          format: date-time
        uptime:
          type: number
        database:
          type: boolean
        redis:
          type: boolean
        memory:
          type: object
          properties:
            rss: { type: number }
            heapTotal: { type: number }
            heapUsed: { type: number }
            external: { type: number }

  # ============================================================================
  # Invoice Schemas
  # ============================================================================

  InvoiceItem:
    type: object
    required: [description, quantity, unitPriceCents, totalCents]
    properties:
      id:
        type: string
        nullable: true
      invoiceId:
        type: string
      orgId:
        type: string
      description:
        type: string
        maxLength: 500
      quantity:
        type: integer
        minimum: 1
      unitPriceCents:
        type: integer
        minimum: 0
      totalCents:
        type: integer
        minimum: 1

  Invoice:
    type: object
    required: [id, orgId, number, amount, currency, status, periodStart, periodEnd, dueDate, createdAt]
    properties:
      id:
        type: string
      orgId:
        type: string
      stripeInvoiceId:
        type: string
        nullable: true
      number:
        type: string
        description: Human-readable invoice number (e.g., INV-2025-001)
      amount:
        type: integer
        description: Total amount in cents
      currency:
        type: string
        default: USD
      status:
        type: string
        enum: [DRAFT, OPEN, PAID, VOID, UNCOLLECTIBLE]
      periodStart:
        type: string
        format: date-time
      periodEnd:
        type: string
        format: date-time
      dueDate:
        type: string
        format: date-time
      paidAt:
        type: string
        format: date-time
        nullable: true
      pdfUrl:
        type: string
        nullable: true
        description: Path or URL to the generated PDF file
      createdAt:
        type: string
        format: date-time
      items:
        type: array
        items:
          $ref: '#/components/schemas/InvoiceItem'

  CreateInvoiceRequest:
    type: object
    required: [orgId, customerName, customerEmail, periodStart, periodEnd, dueDate, lineItems]
    properties:
      orgId:
        type: string
      customerName:
        type: string
        maxLength: 200
      customerEmail:
        type: string
        format: email
      stripeInvoiceId:
        type: string
        nullable: true
      periodStart:
        type: string
        format: date-time
      periodEnd:
        type: string
        format: date-time
      dueDate:
        type: string
        format: date-time
      currency:
        type: string
        default: USD
      status:
        type: string
        enum: [DRAFT, OPEN, PAID, VOID]
        default: DRAFT
      notes:
        type: string
        maxLength: 2000
        nullable: true
      footerText:
        type: string
        maxLength: 1000
        nullable: true
      lineItems:
        type: array
        minItems: 1
        maxItems: 100
        items:
          $ref: '#/components/schemas/InvoiceItem'

  FinalizeInvoiceRequest:
    type: object
    properties:
      companyName:
        type: string
        maxLength: 200
        nullable: true
      companyAddress:
        type: string
        maxLength: 500
        nullable: true
      logoPath:
        type: string
        nullable: true
      footerText:
        type: string
        maxLength: 1000
        nullable: true

  VoidInvoiceRequest:
    type: object
    properties:
      reason:
        type: string
        maxLength: 1000
        nullable: true

  InvoiceResponse:
    type: object
    required: [id, number, status, amount, currency, createdAt, itemCount]
    properties:
      id:
        type: string
      number:
        type: string
      status:
        type: string
        enum: [DRAFT, OPEN, PAID, VOID, UNCOLLECTIBLE]
      amount:
        type: integer
      currency:
        type: string
      createdAt:
        type: string
        format: date-time
      itemCount:
        type: integer

  InvoiceDetailResponse:
    type: object
    required: [id, number, orgId, amount, currency, status, periodStart, periodEnd, dueDate, items]
    properties:
      id:
        type: string
      number:
        type: string
      orgId:
        type: string
      stripeInvoiceId:
        type: string
        nullable: true
      amount:
        type: integer
      currency:
        type: string
      status:
        type: string
      periodStart:
        type: string
        format: date-time
      periodEnd:
        type: string
        format: date-time
      dueDate:
        type: string
        format: date-time
      paidAt:
        type: string
        format: date-time
        nullable: true
      pdfUrl:
        type: string
        nullable: true
      createdAt:
        type: string
        format: date-time
      items:
        type: array
        items:
          $ref: '#/components/schemas/InvoiceItem'

  InvoiceListResponse:
    type: object
    required: [invoices, total]
    properties:
      invoices:
        type: array
        items:
          $ref: '#/components/schemas/InvoiceResponse'
      total:
        type: integer

  DeleteInvoiceResponse:
    type: object
    properties:
      id:
        type: string
      deleted:
        type: boolean

  FinalizeInvoiceResponse:
    type: object
    required: [id, number, status, pdfUrl]
    properties:
      id:
        type: string
      number:
        type: string
      status:
        type: string
        enum: [OPEN]
      pdfUrl:
        type: string
        description: Path to the generated PDF file

  VoidInvoiceResponse:
    type: object
    required: [id, status]
    properties:
      id:
        type: string
      status:
        type: string
        enum: [VOID]

  # ============================================================================
  # Workflow Schemas
  # ============================================================================

  WorkflowStepAction:
    type: object
    required: [type, config]
    properties:
      type:
        type: string
        enum: [message, api-call, queue-job, delay, custom, parallel]
      config:
        type: object
        description: Action-specific configuration fields (see documentation)

  WorkflowStep:
    type: object
    required: [name, action]
    properties:
      name:
        type: string
        description: Unique step identifier within the workflow
        maxLength: 200
      description:
        type: string
        description: Human-readable step description
      action:
        $ref: '#/components/schemas/WorkflowStepAction'
      priority:
        type: string
        enum: [low, normal, high, critical]
        default: normal
      timeoutMs:
        type: integer
        minimum: 1
        description: Step-level timeout override
      retryPolicy:
        $ref: '#/components/schemas/RetryPolicy'
      compensation:
        $ref: '#/components/schemas/StepCompensation'
      optional:
        type: boolean
        description: Skip this step if previous step failed
      condition:
        type: object
        properties:
          expression:
            type: string
            description: JavaScript expression evaluated against context

  StepCompensation:
    type: object
    required: [type, action]
    properties:
      type:
        type: string
        enum: [reverse, custom]
      action:
        type: object
        required: [type, config]
        properties:
          type:
            type: string
          config:
            type: object

  RetryPolicy:
    type: object
    required: [maxAttempts, baseDelayMs, maxDelayMs, jitterFactor]
    properties:
      maxAttempts:
        type: integer
        minimum: 1
        description: Maximum retry attempts (including first try)
      baseDelayMs:
        type: integer
        minimum: 0
        description: Initial backoff delay in milliseconds
      maxDelayMs:
        type: integer
        minimum: 1
        description: Maximum backoff delay ceiling
      jitterFactor:
        type: number
        minimum: 0
        maximum: 1
        description: Randomization factor (0-1) to prevent thundering herd

  WorkflowCompensation:
    type: object
    required: [type, steps]
    properties:
      type:
        type: string
        enum: [sequential, parallel]
      steps:
        type: array
        items:
          $ref: '#/components/schemas/WorkflowStep'
        minItems: 1

  CreateWorkflowRequest:
    type: object
    required: [workflowId, name, steps]
    properties:
      workflowId:
        type: string
        minLength: 1
        maxLength: 100
      name:
        type: string
        minLength: 1
        maxLength: 200
      description:
        type: string
        nullable: true
      steps:
        type: array
        minItems: 1
        items:
          $ref: '#/components/schemas/WorkflowStep'
      compensation:
        $ref: '#/components/schemas/WorkflowCompensation'
      timeoutMs:
        type: integer
        minimum: 1
      retryPolicy:
        $ref: '#/components/schemas/RetryPolicy'

  UpdateWorkflowRequest:
    type: object
    properties:
      workflowId:
        type: string
        minLength: 1
        maxLength: 100
      name:
        type: string
        minLength: 1
        maxLength: 200
      description:
        type: string
        nullable: true
      steps:
        type: array
        minItems: 1
        items:
          $ref: '#/components/schemas/WorkflowStep'
      compensation:
        $ref: '#/components/schemas/WorkflowCompensation'
      timeoutMs:
        type: integer
        minimum: 1
      retryPolicy:
        $ref: '#/components/schemas/RetryPolicy'

  WorkflowDefinitionResponse:
    type: object
    required: [id, workflowId, name, version, isActive, createdAt]
    properties:
      id:
        type: string
      workflowId:
        type: string
      name:
        type: string
      description:
        type: string
        nullable: true
      version:
        type: integer
      steps:
        type: array
        items:
          $ref: '#/components/schemas/WorkflowStep'
      compensation:
        $ref: '#/components/schemas/WorkflowCompensation'
      timeoutMs:
        type: integer
      retryPolicy:
        $ref: '#/components/schemas/RetryPolicy'
      isActive:
        type: boolean
      createdBy:
        type: string
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time

  ListWorkflowsResponse:
    type: object
    required: [definitions, total]
    properties:
      definitions:
        type: array
        items:
          type: object
          required: [id, workflowId, name, version, isActive, createdAt]
          properties:
            id:
              type: string
            workflowId:
              type: string
            name:
              type: string
            description:
              type: string
              nullable: true
            version:
              type: integer
            isActive:
              type: boolean
            stepCount:
              type: integer
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
      total:
        type: integer

  StartWorkflowRequest:
    type: object
    required: [definitionId]
    properties:
      definitionId:
        type: string
      context:
        type: object
        additionalProperties: true
        description: Initial workflow context data

  WorkflowInstanceResponse:
    type: object
    required: [instanceId, status, startedAt]
    properties:
      instanceId:
        type: string
      status:
        type: string
        enum: [PENDING, RUNNING, COMPLETED, FAILED, CANCELLED, COMPENSATING, COMPENSATED]
      currentStep:
        type: integer
        nullable: true
      contextJson:
        type: object
        additionalProperties: true
      startedAt:
        type: string
        format: date-time
      completedAt:
        type: string
        format: date-time
        nullable: true
      failedAt:
        type: string
        format: date-time
        nullable: true
      failureReason:
        type: string
        nullable: true
      stepsHistory:
        type: array
        items:
          $ref: '#/components/schemas/WorkflowStepHistory'
      orgId:
        type: string
      definition:
        $ref: '#/components/schemas/WorkflowDefinitionRef'

  WorkflowDefinitionRef:
    type: object
    required: [id, workflowId, name]
    properties:
      id:
        type: string
      workflowId:
        type: string
      name:
        type: string

  WorkflowStepHistory:
    type: object
    required: [stepIndex, status, startedAt]
    properties:
      stepIndex:
        type: integer
      stepName:
        type: string
      status:
        type: string
        enum: [PENDING, RUNNING, COMPLETED, FAILED, SKIPPED]
      startedAt:
        type: string
        format: date-time
      completedAt:
        type: string
        format: date-time
        nullable: true
      failedAt:
        type: string
        format: date-time
        nullable: true
      errorMessage:
        type: string
        nullable: true
      retryCount:
        type: integer
        default: 0
      inputJson:
        type: object
        nullable: true
      outputJson:
        type: object
        nullable: true
      metadata:
        type: object
        nullable: true

  ListInstancesResponse:
    type: object
    required: [instances, total]
    properties:
      instances:
        type: array
        items:
          $ref: '#/components/schemas/WorkflowInstanceListItem'
      total:
        type: integer
      nextOffset:
        type: integer
        nullable: true

  WorkflowInstanceListItem:
    type: object
    required: [id, instanceId, status, startedAt, orgId]
    properties:
      id:
        type: string
      instanceId:
        type: string
      status:
        type: string
        enum: [PENDING, RUNNING, COMPLETED, FAILED, CANCELLED, COMPENSATING, COMPENSATED]
      currentStep:
        type: integer
        nullable: true
      startedAt:
        type: string
        format: date-time
      completedAt:
        type: string
        format: date-time
        nullable: true
      failedAt:
        type: string
        format: date-time
        nullable: true
      failureReason:
        type: string
        nullable: true
      orgId:
        type: string
      definition:
        $ref: '#/components/schemas/WorkflowDefinitionRef'

  WorkflowHealthResponse:
    type: object
    required: [status, queue, timestamp]
    properties:
      status:
        type: string
        enum: [healthy, degraded, unhealthy]
      queue:
        type: object
        properties:
          active:
            type: integer
          waiting:
            type: integer
          completed:
            type: integer
          failed:
            type: integer
          delayed:
            type: integer
      timestamp:
        type: string
        format: date-time

EOF
