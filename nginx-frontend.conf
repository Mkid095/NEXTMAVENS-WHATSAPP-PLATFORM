# Rate limiting zone for API (10 MB zone, 10 req/sec average with burst of 20)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Logging
access_log /var/log/nginx/access.log;
error_log /var/log/nginx/error.log warn;

server {
    listen 80;
    server_name whatsapp.nextmavens.cloud;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to backend with rate limiting
    location /api/v1/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://whatsapp-backend:3000/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Proxy webhook endpoints to backend (if different path)
    location /webhooks/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://whatsapp-backend:3000/webhooks/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health and metrics endpoints (monitoring)
    location /health {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://whatsapp-backend:3000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /metrics {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://whatsapp-backend:3000/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # WebSocket endpoint for Socket.IO (real-time updates)
    location /socket.io {
        proxy_pass http://whatsapp-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
}
